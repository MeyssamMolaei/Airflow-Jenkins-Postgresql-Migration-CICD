---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statsd-exporter
spec:
  serviceName: "statsd-exporter"
  replicas: 1
  selector:
    matchLabels:
      app: statsd-exporter
  template:
    metadata:
      labels:
        app: statsd-exporter
    spec:
      containers:
        - name: statsd-exporter
          image: prom/statsd-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9102
            - containerPort: 8125
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: statsd-exporter
spec:
  ports:
    - name: metrics
      port: 9102
      targetPort: 9102
    - name: statsd
      port: 8125
      targetPort: 8125
      protocol: UDP
  selector:
    app: statsd-exporter

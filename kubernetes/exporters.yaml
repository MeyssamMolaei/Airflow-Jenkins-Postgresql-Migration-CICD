apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-exporter-p1
spec:
  serviceName: "postgres-exporter-p1"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-p1
  template:
    metadata:
      labels:
        app: postgres-exporter-p1
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://postgres:p1password@postgres-p1:5432/source_db?sslmode=disable"
          ports:
            - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-p1
spec:
  ports:
    - port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter-p1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-exporter-p2
spec:
  serviceName: "postgres-exporter-p2"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-p2
  template:
    metadata:
      labels:
        app: postgres-exporter-p2
    spec:
      containers:
        - name: postgres-exporter

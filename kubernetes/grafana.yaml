apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Postgres-P1
        type: postgres
        url: postgres-p1:5432
        database: source_db
        user: postgres
        secureJsonData:
          password: "p1password"
        jsonData:
          sslmode: 'disable'
          postgresVersion: 15
      - name: Postgres-P2
        type: postgres
        url: postgres-p2:5432
        database: target_db
        user: postgres
        secureJsonData:
          password: "p2password"
        jsonData:
          sslmode: 'disable'
          postgresVersion: 15
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30070
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana
spec:
  serviceName: "grafana"
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
          volumeMounts:
            - name: grafana-datasources-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-volume
              mountPath: /etc/grafana/provisioning/dashboards
      volumes:
        - name: grafana-datasources-volume
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-volume
          hostPath:
            path: /home/development/deployment/grafana/dashboards
            type: Directory

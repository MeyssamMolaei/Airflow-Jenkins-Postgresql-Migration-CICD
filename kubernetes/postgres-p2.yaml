apiVersion: v1
kind: Service
metadata:
  name: postgres-p2
spec:
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30434
  selector:
    app: postgres-p2
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-p2
spec:
  serviceName: "postgres-p2"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-p2
  template:
    metadata:
      labels:
        app: postgres-p2
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:latest
          env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: "trust"
            - name: POSTGRES_DB
              value: "target_db"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          hostPath:
            path: /home/development/deployment/data/postgres-p2
            type: DirectoryOrCreate

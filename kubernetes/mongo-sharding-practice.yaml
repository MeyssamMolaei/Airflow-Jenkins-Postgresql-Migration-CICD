apiVersion: v1
kind: Namespace
metadata:
  name: mongo-sharding
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-configdb
  namespace: mongo-sharding
spec:
  clusterIP: None
  selector:
    app: mongo-configdb
  ports:
    - name: mongo
      port: 27019
      targetPort: 27019
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-configdb
  namespace: mongo-sharding
spec:
  serviceName: mongo-configdb
  replicas: 1
  selector:
    matchLabels:
      app: mongo-configdb
  template:
    metadata:
      labels:
        app: mongo-configdb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:7.0
          command:
            - mongod
            - --configsvr
            - --replSet
            - configRS
            - --port
            - "27019"
            - --bind_ip_all
            - --dbpath
            - /data/db
          ports:
            - containerPort: 27019
              name: mongo
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --port 27019 --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --port 27019 --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: mongo-configdb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
  volumeClaimTemplates:
    - metadata:
        name: mongo-configdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-config-rs
  namespace: mongo-sharding
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-config-rs
          image: mongo:7.0
          command:
            - sh
            - -c
            - |
              until mongosh --host mongo-configdb-0.mongo-configdb.mongo-sharding.svc.cluster.local --port 27019 --quiet --eval "db.adminCommand('ping').ok"; do
                echo "waiting for config server..."
                sleep 5
              done

              mongosh --host mongo-configdb-0.mongo-configdb.mongo-sharding.svc.cluster.local --port 27019 --quiet --eval '
                try {
                  rs.status()
                  print("configRS already initialized")
                } catch (e) {
                  rs.initiate({
                    _id: "configRS",
                    configsvr: true,
                    members: [
                      { _id: 0, host: "mongo-configdb-0.mongo-configdb.mongo-sharding.svc.cluster.local:27019" }
                    ]
                  })
                }
              '
---

# =========================================================
# MongoDB Custom Sharding Practice Environment
# Includes: Config Server, Mongos Router, and 2x Sharded Replica Sets (3 Pods Each)
# ALL DEPLOYED TO THE DEFAULT NAMESPACE INLINE WITH CLUSTER DYNAMICS
# =========================================================

# 1️⃣ Config Server (Replica Set)
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-configdb
spec:
  clusterIP: None
  ports:
    - port: 27019
  selector:
    app: mongo-configdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-configdb
spec:
  serviceName: mongo-configdb
  replicas: 1
  selector:
    matchLabels:
      app: mongo-configdb
  template:
    metadata:
      labels:
        app: mongo-configdb
    spec:
      containers:
      - name: mongodb
        image: docker.io/library/mongo:latest
        command: ["mongod", "--configsvr", "--replSet", "configRS", "--bind_ip_all"]
        ports:
        - containerPort: 27019
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-config-rs
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-config-rs
          image: docker.io/library/mongo:latest
          command:
            - sh
            - -c
            - |
              until mongosh --host mongo-configdb-0.mongo-configdb.default.svc.cluster.local --port 27019 --quiet --eval "db.adminCommand('ping').ok"; do
                echo "waiting for config server..."
                sleep 5
              done

              mongosh --host mongo-configdb-0.mongo-configdb.default.svc.cluster.local --port 27019 --quiet --eval '
                try {
                  rs.status()
                  print("configRS already initialized")
                } catch (e) {
                  rs.initiate({
                    _id: "configRS",
                    configsvr: true,
                    members: [
                      { _id: 0, host: "mongo-configdb-0.mongo-configdb.default.svc.cluster.local:27019" }
                    ]
                  })
                }
              '


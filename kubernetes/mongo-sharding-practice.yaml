# 4️⃣ Mongos Router Service
---
apiVersion: v1
kind: Service
metadata:
  name: mongos
spec:
  type: NodePort
  selector:
    app: mongos
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30018
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongos
  template:
    metadata:
      labels:
        app: mongos
    spec:
      containers:
      - name: mongos
        image: docker.io/library/mongo:latest
        command: ["mongos", "--configdb", "configRS/mongo-configdb-0.mongo-configdb:27019", "--bind_ip_all"]
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

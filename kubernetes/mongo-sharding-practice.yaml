---
apiVersion: v1
kind: Service
metadata:
  name: mongos
  namespace: mongo-sharding
spec:
  type: NodePort
  selector:
    app: mongos
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      nodePort: 30018
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
  namespace: mongo-sharding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongos
  template:
    metadata:
      labels:
        app: mongos
    spec:
      containers:
        - name: mongos
          image: mongo:7.0
          command:
            - mongos
            - --configdb
            - configRS/mongo-configdb-0.mongo-configdb.mongo-sharding.svc.cluster.local:27019
            - --bind_ip_all
            - --port
            - "27017"
          ports:
            - containerPort: 27017
              name: mongo
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --port 27017 --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongosh --port 27017 --quiet --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: add-shards
  namespace: mongo-sharding
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: add-shards
          image: mongo:7.0
          command:
            - sh
            - -c
            - |
              until mongosh --host mongos.mongo-sharding.svc.cluster.local --port 27017 --quiet --eval "db.adminCommand('ping').ok"; do
                echo "waiting for mongos..."
                sleep 5
              done

              until mongosh --host mongo-shard0-0.mongo-shard0.mongo-sharding.svc.cluster.local --port 27018 --quiet --eval "rs.status().ok" >/dev/null 2>&1; do
                echo "waiting for shard0RS..."
                sleep 5
              done

              until mongosh --host mongo-shard1-0.mongo-shard1.mongo-sharding.svc.cluster.local --port 27018 --quiet --eval "rs.status().ok" >/dev/null 2>&1; do
                echo "waiting for shard1RS..."
                sleep 5
              done

              mongosh --host mongos.mongo-sharding.svc.cluster.local --port 27017 --quiet --eval '
                const s = sh.status()
                const txt = JSON.stringify(s)

                if (!txt.includes("shard0RS")) {
                  sh.addShard("shard0RS/mongo-shard0-0.mongo-shard0.mongo-sharding.svc.cluster.local:27018,mongo-shard0-1.mongo-shard0.mongo-sharding.svc.cluster.local:27018,mongo-shard0-2.mongo-shard0.mongo-sharding.svc.cluster.local:27018")
                } else {
                  print("shard0RS already added")
                }

                if (!txt.includes("shard1RS")) {
                  sh.addShard("shard1RS/mongo-shard1-0.mongo-shard1.mongo-sharding.svc.cluster.local:27018,mongo-shard1-1.mongo-shard1.mongo-sharding.svc.cluster.local:27018,mongo-shard1-2.mongo-shard1.mongo-sharding.svc.cluster.local:27018")
                } else {
                  print("shard1RS already added")
                }

                printjson(sh.status())
              '
# =========================================================
# MongoDB Custom Sharding Practice Environment
# Includes: Config Server, Mongos Router, and 2x Sharded Replica Sets (3 Pods Each)
# =========================================================

# 1️⃣ Config Server (Replica Set)
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-configdb
spec:
  clusterIP: None
  ports:
    - port: 27019
  selector:
    app: mongo-configdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-configdb
spec:
  serviceName: mongo-configdb
  replicas: 1
  selector:
    matchLabels:
      app: mongo-configdb
  template:
    metadata:
      labels:
        app: mongo-configdb
    spec:
      containers:
      - name: mongodb
        image: docker.io/library/mongo:latest
        command: ["mongod", "--configsvr", "--replSet", "configRS", "--bind_ip_all"]
        ports:
        - containerPort: 27019
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

# 2️⃣ Shard 0 (Replica Set - 3 Pods)
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-shard0
spec:
  clusterIP: None
  selector:
    app: mongo-shard0
  ports:
    - port: 27018
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-shard0
spec:
  serviceName: mongo-shard0
  replicas: 3
  selector:
    matchLabels:
      app: mongo-shard0
  template:
    metadata:
      labels:
        app: mongo-shard0
    spec:
      containers:
      - name: mongodb
        image: docker.io/library/mongo:latest
        command: ["mongod", "--shardsvr", "--replSet", "shard0RS", "--bind_ip_all"]
        ports:
        - containerPort: 27018
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"

# 3️⃣ Shard 1 (Replica Set - 3 Pods)
---
apiVersion: v1

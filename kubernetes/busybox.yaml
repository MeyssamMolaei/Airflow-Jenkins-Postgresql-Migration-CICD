apiVersion: v1
kind: Pod
metadata:
  name: tools-pod
  namespace: default
spec:
  restartPolicy: Always
  containers:
    - name: tools
      image: debian:stable-slim
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: tools-volume
          mountPath: /tools-pod
        - name: apt-cache
          mountPath: /var/cache/apt/archives
        - name: apt-lists
          mountPath: /var/lib/apt/lists
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e

          mkdir -p /var/cache/apt/archives/partial
          mkdir -p /var/lib/apt/lists/partial

          cat >/etc/apt/apt.conf.d/99local-cache <<'EOF'
          Binary::apt::APT::Keep-Downloaded-Packages "true";
          APT::Keep-Downloaded-Packages "true";
          EOF

          apt-get update
          apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            postgresql-client \
            iputils-ping \
            ca-certificates \
            dnsutils \
            curl \
            wget \
            nano \
            openssh-server \
            openssh-client \
            netcat-openbsd

          echo "Tools container is ready."
          sleep infinity
  volumes:
    - name: tools-volume
      hostPath:
        path: /home/development/deployment/tools-pod
        type: DirectoryOrCreate
    - name: apt-cache
      hostPath:
        path: /home/development/deployment/tools-pod/apt-cache
        type: DirectoryOrCreate
    - name: apt-lists
      hostPath:
        path: /home/development/deployment/tools-pod/apt-lists
        type: DirectoryOrCreate
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tools-pod
  namespace: default
spec:
  serviceName: "tools-pod"
  replicas: 1
  selector:
    matchLabels:
      app: tools-pod
  template:
    metadata:
      labels:
        app: tools-pod
    spec:
      containers:
        - name: tools
          # image: debian:stable-slim
          image: my-tools:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: tools-volume
              mountPath: /tools-pod
            - name: apt-cache
              mountPath: /var/cache/apt/archives
            - name: apt-lists
              mountPath: /var/lib/apt/lists
            - name: scripts
              mountPath: /scripts
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              sleep infinity
      volumes:
        - name: tools-volume
          hostPath:
            path: /home/development/deployment/tools-pod
            type: DirectoryOrCreate
        - name: apt-cache
          hostPath:
            path: /home/development/deployment/tools-pod/apt-cache
            type: DirectoryOrCreate
        - name: apt-lists
          hostPath:
            path: /home/development/deployment/tools-pod/apt-lists
            type: DirectoryOrCreate
        - name: scripts
          hostPath:
            path: /home/development/deployment/scripts
            type: Directory